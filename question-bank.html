<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentor Teacher - Question Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2a7de1; --primary-hover: #1a67c4;
      --bg: #f4f7fc; --bg-dark: #0b0e14;
      --card: #ffffff; --card-dark: #1a1f2b;
      --text: #0b1e33; --text-dark: #eef2f6;
      --sidebar-bg: rgba(255,255,255,0.85); --sidebar-bg-dark: rgba(26,31,43,0.9);
      --glass-bg: rgba(255,255,255,0.7); --glass-bg-dark: rgba(26,31,43,0.7);
      --shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }

    .sidebar {
      width: 260px; height: 100vh; position: fixed; top: 0; left: 0;
      background: var(--sidebar-bg); backdrop-filter: blur(24px);
      border-right: 1px solid rgba(255,255,255,0.2);
      padding: 20px; overflow-y: auto; z-index: 1000;
      transition: transform 0.3s, background 0.3s;
    }
    body.dark .sidebar { background: var(--sidebar-bg-dark); border-color: rgba(255,255,255,0.05); }
    .sidebar .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
    .sidebar .logo i { font-size: 28px; color: var(--primary); }
    .sidebar .logo span { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #2a7de1, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 12px;
      color: inherit; text-decoration: none;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 4px; font-weight: 500;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      background: rgba(42,125,225,0.1); color: var(--primary);
    }
    .sidebar nav a i { width: 20px; text-align: center; }

    .main {
      flex: 1; margin-left: 260px; padding: 20px 30px;
      transition: margin-left 0.3s; width: calc(100% - 260px);
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
    }
    .topbar h1 { font-size: 28px; font-weight: 700; }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 8px 16px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; gap: 6px; color: inherit;
    }
    body.dark .icon-btn { background: var(--glass-bg-dark); border-color: rgba(255,255,255,0.05); }
    .hamburger { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: inherit; }

    .card {
      background: var(--card); backdrop-filter: blur(20px);
      border-radius: 20px; padding: 24px; box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px;
      transition: background 0.3s;
    }
    body.dark .card { background: var(--card-dark); border-color: rgba(255,255,255,0.05); }
    .card h2 { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    .btn {
      background: var(--primary); color: white; border: none;
      padding: 10px 20px; border-radius: 12px; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px; border: 1px solid #e0e5ec; border-radius: 10px;
      font-family: inherit; background: rgba(255,255,255,0.8);
      transition: border 0.2s; color: inherit;
    }
    body.dark .form-group input, body.dark .form-group select, body.dark .form-group textarea {
      background: rgba(26,31,43,0.8); border-color: #2a3142; color: #eef2f6;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--primary);
    }

    .options-container { margin-top: 5px; }
    .option-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
    .option-row input[type="text"] { flex: 1; }
    .option-row button { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    body.dark th, body.dark td { border-color: rgba(255,255,255,0.05); }
    th { opacity: 0.7; font-weight: 600; }

    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      display: flex; justify-content: center; align-items: center;
      z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s;
    }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content {
      background: var(--card); border-radius: 24px; padding: 30px;
      width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow);
    }
    body.dark .modal-content { background: var(--card-dark); }

    .toast { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #0b1e33; padding: 16px 24px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 12px; backdrop-filter: blur(20px); z-index: 3000; transform: translateY(120px); opacity: 0; transition: 0.3s; max-width: 350px; border-left: 4px solid var(--primary); }
    body.dark .toast { background: #1a1f2b; color: #eef2f6; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: #e74c3c; }
    .toast.success { border-left-color: #2ecc71; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; width: 100%; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="logo"><i class="fas fa-chalkboard-teacher"></i><span>Zentor</span></div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-th-large"></i> <span data-lang="dashboard">Dashboard</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i> <span data-lang="courses">Courses</span></a>
      <a href="lessons.html"><i class="fas fa-play-circle"></i> <span data-lang="lessons">Lessons</span></a>
      <a href="live-classes.html"><i class="fas fa-video"></i> <span data-lang="live-classes">Live Classes</span></a>
      <a href="students.html"><i class="fas fa-users"></i> <span data-lang="students">Students</span></a>
      <a href="assignments.html"><i class="fas fa-tasks"></i> <span data-lang="assignments">Assignments</span></a>
      <a href="exams.html"><i class="fas fa-file-alt"></i> <span data-lang="exams">Exams</span></a>
      <a href="exam-results.html"><i class="fas fa-chart-bar"></i> <span data-lang="exam-results">Exam Results</span></a>
      <a href="question-bank.html" class="active"><i class="fas fa-database"></i> <span data-lang="question-bank">Question Bank</span></a>
      <a href="messages.html"><i class="fas fa-comments"></i> <span data-lang="messages">Messages</span></a>
      <a href="settings.html"><i class="fas fa-cog"></i> <span data-lang="settings">Settings</span></a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <h1 data-lang="question-bank">Question Bank</h1>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="langToggle"><i class="fas fa-globe"></i> <span>AR</span></button>
        <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i> <span>Dark</span></button>
        <button class="btn" id="addQuestionBtn"><i class="fas fa-plus"></i> <span data-lang="add-question">Add Question</span></button>
      </div>
    </div>

    <div class="card">
      <div style="margin-bottom:15px;"><strong data-lang="exam">Exam:</strong> <span id="examTitleDisplay">---</span></div>
      <div id="questionsContainer"></div>
    </div>
  </main>

  <!-- Question Modal -->
  <div class="modal" id="questionModal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Question</h2>
      <form id="questionForm">
        <div class="form-group">
          <label data-lang="question-text">Question Text</label>
          <textarea id="questionText" rows="2" required></textarea>
        </div>
        <div class="form-group">
          <label data-lang="type">Type</label>
          <select id="questionType" required>
            <option value="multiple_choice">Multiple Choice</option>
            <option value="true_false">True / False</option>
            <option value="short_answer">Short Answer</option>
          </select>
        </div>
        <div class="form-group" id="optionsGroup">
          <label data-lang="options">Options</label>
          <div class="options-container" id="optionsList">
            <!-- Dynamic option rows -->
          </div>
          <button type="button" class="btn btn-outline" id="addOptionBtn" style="margin-top:5px;"><i class="fas fa-plus"></i> Add Option</button>
        </div>
        <div class="form-group" id="correctAnswerGroup">
          <label data-lang="correct-answer">Correct Answer</label>
          <input type="text" id="correctAnswer" placeholder="For multiple choice, enter the exact option text. For true/false, type true or false." required>
        </div>
        <div class="form-group">
          <label data-lang="points">Points</label>
          <input type="number" id="questionPoints" value="1" min="1" required>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button type="button" class="btn btn-outline" id="cancelQuestionBtn"><span data-lang="cancel">Cancel</span></button>
          <button type="submit" class="btn"><i class="fas fa-save"></i> <span data-lang="save">Save</span></button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('examId');
    let currentTeacherId = null;
    let currentLang = localStorage.getItem('zentor_lang') || 'en';
    let editingQuestionId = null;
    let currentExamId = examId || '';

    const toast = document.getElementById('toast');
    function showToast(msg, type='success') {
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelector('#langToggle span').textContent = lang === 'en' ? 'AR' : 'EN';
      const trans = {
        en: {
          dashboard: 'Dashboard', courses: 'Courses', lessons: 'Lessons', 'live-classes': 'Live Classes',
          students: 'Students', assignments: 'Assignments', exams: 'Exams', 'exam-results': 'Exam Results',
          'question-bank': 'Question Bank', messages: 'Messages', settings: 'Settings',
          'add-question': 'Add Question', 'question-text': 'Question Text', type: 'Type',
          options: 'Options', 'correct-answer': 'Correct Answer', points: 'Points',
          cancel: 'Cancel', save: 'Save', edit: 'Edit', delete: 'Delete',
          'no-questions': 'No questions yet.', 'select-exam': 'Please select an exam.',
          'exam': 'Exam:'
        },
        ar: {
          dashboard: 'لوحة التحكم', courses: 'الكورسات', lessons: 'الدروس', 'live-classes': 'الحصص المباشرة',
          students: 'الطلاب', assignments: 'الواجبات', exams: 'الامتحانات', 'exam-results': 'نتائج الامتحانات',
          'question-bank': 'بنك الأسئلة', messages: 'الرسائل', settings: 'الإعدادات',
          'add-question': 'إضافة سؤال', 'question-text': 'نص السؤال', type: 'النوع',
          options: 'الخيارات', 'correct-answer': 'الإجابة الصحيحة', points: 'النقاط',
          cancel: 'إلغاء', save: 'حفظ', edit: 'تعديل', delete: 'حذف',
          'no-questions': 'لا توجد أسئلة.', 'select-exam': 'يرجى اختيار امتحان.',
          'exam': 'الامتحان:'
        }
      };
      document.querySelectorAll('[data-lang]').forEach(el => {
        const key = el.getAttribute('data-lang');
        if (trans[lang] && trans[lang][key]) el.textContent = trans[lang][key];
      });
    }
    function applyTheme() {
      const saved = localStorage.getItem('zentor_theme') || 'light';
      const dark = saved === 'dark';
      document.body.classList.toggle('dark', dark);
      document.getElementById('themeToggle').innerHTML = dark ? '<i class="fas fa-sun"></i> <span>Light</span>' : '<i class="fas fa-moon"></i> <span>Dark</span>';
    }

    document.getElementById('langToggle').addEventListener('click', ()=>{
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      localStorage.setItem('zentor_lang', currentLang);
      applyLanguage(currentLang);
      loadQuestions();
    });
    document.getElementById('themeToggle').addEventListener('click', ()=>{
      document.body.classList.toggle('dark');
      localStorage.setItem('zentor_theme', document.body.classList.contains('dark')?'dark':'light');
      applyTheme();
    });
    document.getElementById('hamburgerBtn').addEventListener('click', ()=> document.getElementById('sidebar').classList.toggle('open'));

    const questionModal = document.getElementById('questionModal');
    const questionForm = document.getElementById('questionForm');
    const addQuestionBtn = document.getElementById('addQuestionBtn');
    const cancelQuestionBtn = document.getElementById('cancelQuestionBtn');
    const questionTypeSelect = document.getElementById('questionType');
    const optionsGroup = document.getElementById('optionsGroup');
    const optionsList = document.getElementById('optionsList');
    const addOptionBtn = document.getElementById('addOptionBtn');
    const correctAnswerGroup = document.getElementById('correctAnswerGroup');

    // Show/hide fields based on type
    questionTypeSelect.addEventListener('change', () => {
      const type = questionTypeSelect.value;
      if (type === 'multiple_choice') {
        optionsGroup.style.display = 'block';
        correctAnswerGroup.style.display = 'block';
        document.getElementById('correctAnswer').placeholder = 'Enter correct option text';
      } else if (type === 'true_false') {
        optionsGroup.style.display = 'none';
        correctAnswerGroup.style.display = 'block';
        document.getElementById('correctAnswer').placeholder = 'true or false';
      } else { // short_answer
        optionsGroup.style.display = 'none';
        correctAnswerGroup.style.display = 'block';
        document.getElementById('correctAnswer').placeholder = 'Enter acceptable answer';
      }
    });

    // Add option row
    addOptionBtn.addEventListener('click', () => {
      const row = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `<input type="text" class="option-input" placeholder="Option text" required>
        <button type="button" class="remove-option"><i class="fas fa-times"></i></button>`;
      row.querySelector('.remove-option').addEventListener('click', () => row.remove());
      optionsList.appendChild(row);
    });

    // Set default options for new question
    function setDefaultOptions() {
      optionsList.innerHTML = '';
      // Add two empty options
      for (let i=0; i<2; i++) {
        addOptionBtn.click();
      }
    }

    addQuestionBtn.addEventListener('click', () => {
      editingQuestionId = null;
      document.getElementById('modalTitle').textContent = currentLang==='ar'?'إضافة سؤال':'Add Question';
      questionForm.reset();
      setDefaultOptions();
      questionTypeSelect.value = 'multiple_choice';
      questionTypeSelect.dispatchEvent(new Event('change'));
      questionModal.classList.add('active');
    });

    cancelQuestionBtn.addEventListener('click', () => questionModal.classList.remove('active'));

    // Submit question
    questionForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('questionText').value.trim();
      const type = questionTypeSelect.value;
      const points = parseInt(document.getElementById('questionPoints').value);
      const correctAnswer = document.getElementById('correctAnswer').value.trim().toLowerCase();
      
      let options = [];
      if (type === 'multiple_choice') {
        const optionInputs = document.querySelectorAll('.option-input');
        options = Array.from(optionInputs).map(inp => inp.value.trim()).filter(v => v);
        if (options.length < 2) {
          showToast(currentLang==='ar'?'أضف خيارين على الأقل':'Please add at least two options.', 'error');
          return;
        }
      } else if (type === 'true_false') {
        if (!['true','false'].includes(correctAnswer)) {
          showToast(currentLang==='ar'?'الإجابة يجب أن تكون true أو false':'Answer must be true or false.', 'error');
          return;
        }
      }

      const data = {
        text,
        type,
        points,
        correctAnswer: type === 'true_false' ? (correctAnswer === 'true') : correctAnswer,
        options: type === 'multiple_choice' ? options : [],
        updatedAt: new Date().toISOString()
      };

      try {
        if (editingQuestionId) {
          await updateDoc(doc(db, `teachers/${currentTeacherId}/exams/${currentExamId}/questions`, editingQuestionId), data);
          showToast(currentLang==='ar'?'تم تحديث السؤال':'Question updated');
        } else {
          await addDoc(collection(db, `teachers/${currentTeacherId}/exams/${currentExamId}/questions`), {
            ...data,
            createdAt: new Date().toISOString()
          });
          showToast(currentLang==='ar'?'تم إضافة السؤال':'Question added');
        }
        questionModal.classList.remove('active');
        loadQuestions();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    // Load exam title
    async function loadExamTitle() {
      if (!currentTeacherId || !currentExamId) return;
      try {
        const snap = await getDoc(doc(db, `teachers/${currentTeacherId}/exams`, currentExamId));
        if (snap.exists()) {
          document.getElementById('examTitleDisplay').textContent = snap.data().title || currentExamId;
        }
      } catch (e) { console.error(e); }
    }

    // Load questions
    async function loadQuestions() {
      if (!currentTeacherId || !currentExamId) {
        document.getElementById('questionsContainer').innerHTML = `<div class="empty-state" data-lang="select-exam">${currentLang==='ar'?'يرجى اختيار امتحان.':'Please select an exam.'}</div>`;
        applyLanguage(currentLang);
        return;
      }
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i></div>';
      try {
        const snap = await getDocs(collection(db, `teachers/${currentTeacherId}/exams/${currentExamId}/questions`));
        const questions = [];
        snap.forEach(doc => questions.push({ id: doc.id, ...doc.data() }));
        if (questions.length === 0) {
          container.innerHTML = `<div class="empty-state" data-lang="no-questions">${currentLang==='ar'?'لا توجد أسئلة.':'No questions yet.'}</div>`;
          return;
        }
        let html = `<table><thead><tr><th>#</th><th data-lang="question-text">Text</th><th data-lang="type">Type</th><th data-lang="points">Points</th><th></th></tr></thead><tbody>`;
        questions.forEach((q, idx) => {
          html += `<tr>
            <td>${idx+1}</td>
            <td>${q.text}</td>
            <td>${q.type}</td>
            <td>${q.points}</td>
            <td>
              <button class="btn edit-question-btn" data-id="${q.id}"><i class="fas fa-edit"></i></button>
              <button class="btn btn-danger delete-question-btn" data-id="${q.id}"><i class="fas fa-trash"></i></button>
            </td>
          </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;

        // Edit/Delete handlers
        container.querySelectorAll('.edit-question-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.dataset.id;
            const snap = await getDoc(doc(db, `teachers/${currentTeacherId}/exams/${currentExamId}/questions`, id));
            if (!snap.exists()) return;
            const q = snap.data();
            editingQuestionId = id;
            document.getElementById('modalTitle').textContent = currentLang==='ar'?'تعديل السؤال':'Edit Question';
            document.getElementById('questionText').value = q.text || '';
            questionTypeSelect.value = q.type || 'multiple_choice';
            questionTypeSelect.dispatchEvent(new Event('change'));
            document.getElementById('questionPoints').value = q.points || 1;
            document.getElementById('correctAnswer').value = q.correctAnswer != null ? q.correctAnswer.toString() : '';
            // Populate options
            optionsList.innerHTML = '';
            if (q.options && Array.isArray(q.options)) {
              q.options.forEach(opt => {
                const row = document.createElement('div');
                row.className = 'option-row';
                row.innerHTML = `<input type="text" class="option-input" value="${opt.replace(/"/g, '&quot;')}" required>
                  <button type="button" class="remove-option"><i class="fas fa-times"></i></button>`;
                row.querySelector('.remove-option').addEventListener('click', () => row.remove());
                optionsList.appendChild(row);
              });
            } else {
              setDefaultOptions();
            }
            questionModal.classList.add('active');
          });
        });

        container.querySelectorAll('.delete-question-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if (!confirm(currentLang==='ar'?'هل أنت متأكد من الحذف؟':'Are you sure?')) return;
            await deleteDoc(doc(db, `teachers/${currentTeacherId}/exams/${currentExamId}/questions`, e.currentTarget.dataset.id));
            showToast(currentLang==='ar'?'تم حذف السؤال':'Question deleted');
            loadQuestions();
          });
        });
      } catch (err) {
        container.innerHTML = `<div style="color:red;">Error: ${err.message}</div>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href='login.html'; return; }
      const prefSnap = await getDoc(doc(db, `teachers/${user.uid}/settings/preferences`));
      if (!prefSnap.exists()) { await signOut(auth); window.location.href='login.html'; return; }
      currentTeacherId = user.uid;
      applyLanguage(currentLang);
      applyTheme();
      if (currentExamId) {
        loadExamTitle();
        loadQuestions();
      } else {
        document.getElementById('questionsContainer').innerHTML = `<div class="empty-state" data-lang="select-exam">${currentLang==='ar'?'يرجى اختيار امتحان.':'Please select an exam.'}</div>`;
        applyLanguage(currentLang);
      }
    });
  </script>
</body>
</html>
