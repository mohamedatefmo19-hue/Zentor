<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentor Teacher - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2a7de1; --primary-hover: #1a67c4;
      --bg: #f4f7fc; --bg-dark: #0b0e14;
      --card: #ffffff; --card-dark: #1a1f2b;
      --text: #0b1e33; --text-dark: #eef2f6;
      --glass-bg: rgba(255,255,255,0.7); --glass-bg-dark: rgba(26,31,43,0.7);
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }
    .login-container { width: 100%; max-width: 440px; }
    .login-card {
      background: var(--card); backdrop-filter: blur(20px);
      border-radius: 24px; padding: 40px;
      box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.3s, border 0.3s;
    }
    body.dark .login-card { background: var(--card-dark); border-color: rgba(255,255,255,0.05); }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo i { font-size: 40px; color: var(--primary); }
    .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #2a7de1, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { font-size: 14px; opacity: 0.7; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 14px; }
    .input-wrapper { position: relative; }
    .input-wrapper i.left-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .input-wrapper input {
      width: 100%; padding: 14px 44px 14px 44px;
      border: 1px solid #e0e5ec; border-radius: 12px;
      font-size: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      transition: all 0.2s; color: inherit;
    }
    body.dark .input-wrapper input {
      background: rgba(26,31,43,0.8); border-color: #2a3142; color: #eef2f6;
    }
    .input-wrapper input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(42,125,225,0.1); }
    .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: var(--primary); color: white; font-weight: 600; font-size: 16px;
      cursor: pointer; transition: background 0.2s; display: flex; align-items: center;
      justify-content: center; gap: 8px; margin-top: 10px;
    }
    .btn:hover { background: var(--primary-hover); }
    .error-message { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    .back-home { text-align: center; margin-top: 20px; font-size: 14px; }
    .back-home a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #ffffff; color: #0b1e33;
      padding: 16px 24px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      display: flex; align-items: center; gap: 12px; backdrop-filter: blur(20px);
      z-index: 10000; transform: translateY(120px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1); max-width: 350px;
      border-left: 4px solid var(--primary);
    }
    body.dark .toast { background: #1a1f2b; color: #eef2f6; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: #e74c3c; }
    .toast.success { border-left-color: #2ecc71; }
    .language-toggle, .theme-toggle {
      position: absolute; top: 20px; background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 8px 16px;
      cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px;
    }
    body.dark .language-toggle, body.dark .theme-toggle {
      background: var(--glass-bg-dark); border-color: rgba(255,255,255,0.05);
    }
    .language-toggle { right: 100px; } .theme-toggle { right: 20px; }
    /* Pending screen */
    .pending-screen { display: none; text-align: center; padding: 20px 0; }
    .pending-screen.active { display: block; }
    .pending-screen i { font-size: 60px; color: var(--primary); margin-bottom: 20px; }
    .pending-screen h2 { margin-bottom: 10px; }
    .pending-screen p { opacity: 0.8; margin-bottom: 20px; }
    @media (max-width: 480px) {
      .login-card { padding: 25px; }
      .language-toggle { right: 80px; top: 10px; } .theme-toggle { right: 10px; top: 10px; }
    }
  </style>
</head>
<body>

  <button class="language-toggle" id="langToggle"><i class="fas fa-globe"></i> <span>AR</span></button>
  <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span>Dark</span></button>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <i class="fas fa-chalkboard-teacher"></i>
        <h1>Zentor</h1>
        <p data-lang="teacher-portal">Teacher Portal</p>
      </div>

      <!-- Login form (always visible by default) -->
      <div id="formArea">
        <form id="loginForm">
          <div class="form-group">
            <label data-lang="email">Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope left-icon"></i>
              <input type="email" id="loginEmail" placeholder="teacher@example.com" required>
            </div>
          </div>
          <div class="form-group">
            <label data-lang="password">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock left-icon"></i>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
              <i class="toggle-password fas fa-eye" id="togglePassword"></i>
            </div>
          </div>
          <div class="error-message" id="loginError"></div>
          <button type="submit" class="btn" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> <span data-lang="login">Login</span>
          </button>
        </form>
      </div>

      <!-- Pending screen (hidden by default) -->
      <div class="pending-screen" id="pendingScreen">
        <i class="fas fa-hourglass-half"></i>
        <h2 data-lang="pending-title">Account Under Review</h2>
        <p data-lang="pending-message">Your account is being reviewed by the administrator. You will be able to access the platform once approved.</p>
        <button class="btn" id="pendingLogoutBtn"><i class="fas fa-sign-out-alt"></i> <span data-lang="logout">Logout</span></button>
      </div>

      <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-left"></i> <span data-lang="back-home">Back to Home</span></a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const toast = document.getElementById('toast');
    function showToast(msg, type='success') {
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 5000);
    }

    // Language & Theme
    let currentLang = localStorage.getItem('zentor_lang') || 'en';
    const langToggle = document.getElementById('langToggle');
    const themeToggle = document.getElementById('themeToggle');
    const formArea = document.getElementById('formArea');
    const pendingScreen = document.getElementById('pendingScreen');

    applyLanguage(currentLang);
    applyTheme();

    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      localStorage.setItem('zentor_lang', currentLang);
      applyLanguage(currentLang);
    });

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('zentor_theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> <span>Light</span>' : '<i class="fas fa-moon"></i> <span>Dark</span>';
    });

    function applyTheme() {
      const saved = localStorage.getItem('zentor_theme') || 'light';
      if (saved === 'dark') {
        document.body.classList.add('dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i> <span>Light</span>';
      }
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelector('#langToggle span').textContent = lang === 'en' ? 'AR' : 'EN';
      const trans = {
        en: {
          'teacher-portal': 'Teacher Portal',
          'email': 'Email',
          'password': 'Password',
          'login': 'Login',
          'back-home': 'Back to Home',
          'logout': 'Logout',
          'pending-title': 'Account Under Review',
          'pending-message': 'Your account is being reviewed by the administrator. You will be able to access the platform once approved.'
        },
        ar: {
          'teacher-portal': 'بوابة المعلم',
          'email': 'البريد الإلكتروني',
          'password': 'كلمة المرور',
          'login': 'تسجيل الدخول',
          'back-home': 'العودة للرئيسية',
          'logout': 'تسجيل الخروج',
          'pending-title': 'الحساب قيد المراجعة',
          'pending-message': 'حسابك قيد المراجعة من قبل الإدارة. ستتمكن من الوصول إلى المنصة بمجرد الموافقة.'
        }
      };
      document.querySelectorAll('[data-lang]').forEach(el => {
        const key = el.getAttribute('data-lang');
        if (trans[lang] && trans[lang][key]) el.textContent = trans[lang][key];
      });
    }

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const p = document.getElementById('loginPassword');
      p.type = p.type === 'password' ? 'text' : 'password';
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    // Show pending screen
    function showPendingScreen() {
      formArea.style.display = 'none';
      pendingScreen.classList.add('active');
    }
    function hidePendingScreen() {
      formArea.style.display = 'block';
      pendingScreen.classList.remove('active');
    }

    // Logout from pending screen
    document.getElementById('pendingLogoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      hidePendingScreen();
    });

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
      btn.disabled = true;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        // Check if teacher has profile (registered) and preferences (activated)
        const profileRef = doc(db, `teachers/${cred.user.uid}/settings/profile`);
        const prefRef = doc(db, `teachers/${cred.user.uid}/settings/preferences`);
        const [profileSnap, prefSnap] = await Promise.all([getDoc(profileRef), getDoc(prefRef)]);

        if (!profileSnap.exists()) {
          // Not a teacher at all
          await signOut(auth);
          throw new Error(currentLang === 'ar' ? 'هذا الحساب ليس حساب معلم مسجل.' : 'This account is not a registered teacher.');
        }

        if (!prefSnap.exists()) {
          // Registered but not activated -> show pending screen
          showPendingScreen();
          showToast(currentLang === 'ar' ? 'حسابك قيد المراجعة. انتظر التفعيل.' : 'Your account is under review. Await activation.', 'info');
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          btn.disabled = false;
          return;
        }

        // Fully activated -> go to dashboard
        showToast(currentLang === 'ar' ? 'تم تسجيل الدخول بنجاح' : 'Login successful', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        let msg = err.message;
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          msg = currentLang === 'ar' ? 'بريد إلكتروني أو كلمة مرور غير صحيحة.' : 'Invalid email or password.';
        } else if (err.code === 'auth/invalid-email') {
          msg = currentLang === 'ar' ? 'بريد غير صالح' : 'Invalid email.';
        }
        errEl.textContent = msg;
        errEl.style.display = 'block';
        showToast(msg, 'error');
      } finally {
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        btn.disabled = false;
      }
    });

    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const profileRef = doc(db, `teachers/${user.uid}/settings/profile`);
        const prefRef = doc(db, `teachers/${user.uid}/settings/preferences`);
        const [profileSnap, prefSnap] = await Promise.all([getDoc(profileRef), getDoc(prefRef)]);

        if (profileSnap.exists() && !prefSnap.exists()) {
          // Pending activation
          showPendingScreen();
          return;
        } else if (prefSnap.exists()) {
          // Fully activated -> go to dashboard
          window.location.href = 'dashboard.html';
        } else {
          // Not a teacher at all, sign out
          await signOut(auth);
        }
      }
    });
  </script>
</body>
</html>
