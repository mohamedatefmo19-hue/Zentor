<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentor Teacher - Login / Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2a7de1; --primary-hover: #1a67c4;
      --bg: #f4f7fc; --bg-dark: #0b0e14;
      --card: #ffffff; --card-dark: #1a1f2b;
      --text: #0b1e33; --text-dark: #eef2f6;
      --glass-bg: rgba(255,255,255,0.7); --glass-bg-dark: rgba(26,31,43,0.7);
      --shadow: 0 8px 32px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }
    .login-container { width: 100%; max-width: 480px; }
    .login-card {
      background: var(--card); backdrop-filter: blur(20px);
      border-radius: 24px; padding: 40px;
      box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.3s, border 0.3s;
    }
    body.dark .login-card { background: var(--card-dark); border-color: rgba(255,255,255,0.05); }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo i { font-size: 40px; color: var(--primary); }
    .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #2a7de1, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tabs { display: flex; margin-bottom: 24px; border-radius: 12px; background: rgba(0,0,0,0.04); }
    body.dark .tabs { background: rgba(255,255,255,0.05); }
    .tab {
      flex: 1; text-align: center; padding: 12px;
      cursor: pointer; font-weight: 600; border-radius: 12px;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active { background: var(--primary); color: white; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .input-wrapper input, .input-wrapper select {
      width: 100%; padding: 12px 16px 12px 44px;
      border: 1px solid #e0e5ec; border-radius: 12px;
      font-size: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      transition: all 0.2s; color: inherit;
    }
    body.dark .input-wrapper input, body.dark .input-wrapper select {
      background: rgba(26,31,43,0.8); border-color: #2a3142; color: #eef2f6;
    }
    .input-wrapper input:focus, .input-wrapper select:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(42,125,225,0.1);
    }
    .grade-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .grade-checkboxes label {
      display: flex; align-items: center; gap: 6px; font-size: 14px;
      background: rgba(0,0,0,0.03); padding: 6px 12px; border-radius: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    body.dark .grade-checkboxes label { background: rgba(255,255,255,0.05); }
    .grade-checkboxes input { accent-color: var(--primary); }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: var(--primary); color: white; font-weight: 600; font-size: 16px;
      cursor: pointer; transition: background 0.2s; display: flex; align-items: center;
      justify-content: center; gap: 8px; margin-top: 10px;
    }
    .btn:hover { background: var(--primary-hover); }
    .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; }
    .error-message { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    .back-home { text-align: center; margin-top: 20px; font-size: 14px; }
    .back-home a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #ffffff; color: #0b1e33;
      padding: 16px 24px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      display: flex; align-items: center; gap: 12px; backdrop-filter: blur(20px);
      z-index: 10000; transform: translateY(120px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1); max-width: 350px;
      border-left: 4px solid var(--primary);
    }
    body.dark .toast { background: #1a1f2b; color: #eef2f6; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: #e74c3c; }
    .toast.success { border-left-color: #2ecc71; }
    .language-toggle, .theme-toggle {
      position: absolute; top: 20px; background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 8px 16px;
      cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px;
    }
    body.dark .language-toggle, body.dark .theme-toggle {
      background: var(--glass-bg-dark); border-color: rgba(255,255,255,0.05);
    }
    .language-toggle { right: 100px; } .theme-toggle { right: 20px; }
    @media (max-width: 480px) {
      .login-card { padding: 25px; }
      .language-toggle { right: 80px; top: 10px; } .theme-toggle { right: 10px; top: 10px; }
    }
  </style>
</head>
<body>

  <button class="language-toggle" id="langToggle"><i class="fas fa-globe"></i> <span>AR</span></button>
  <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span>Dark</span></button>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <i class="fas fa-chalkboard-teacher"></i>
        <h1>Zentor</h1>
        <p data-lang="teacher-portal">Teacher Portal</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" id="tabLogin" data-lang="login-tab">Login</div>
        <div class="tab" id="tabRegister" data-lang="register-tab">Create Account</div>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label data-lang="email">Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="teacher@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label data-lang="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <i class="toggle-password fas fa-eye" id="toggleLoginPassword"></i>
          </div>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> <span data-lang="login">Login</span>
        </button>
      </form>

      <!-- Register Form (hidden initially) -->
      <form id="registerForm" style="display: none;">
        <div class="form-group">
          <label data-lang="fullname">Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="regName" required>
          </div>
        </div>
        <div class="form-group">
          <label data-lang="email">Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" required>
          </div>
        </div>
        <div class="form-group">
          <label data-lang="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPassword" required minlength="6">
            <i class="toggle-password fas fa-eye" id="toggleRegPassword"></i>
          </div>
        </div>
        <div class="form-group">
          <label data-lang="phone">Phone Number</label>
          <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input type="tel" id="regPhone" placeholder="+201234567890" required>
          </div>
        </div>
        <div class="form-group">
          <label data-lang="subject">Teaching Subject (choose one)</label>
          <div class="input-wrapper">
            <i class="fas fa-book"></i>
            <select id="regSubject" required>
              <option value="">-- Select Subject --</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label data-lang="grades">Grades You Teach</label>
          <div class="grade-checkboxes" id="gradeCheckboxes"></div>
        </div>
        <div class="error-message" id="registerError"></div>
        <button type="submit" class="btn" id="registerBtn">
          <i class="fas fa-user-plus"></i> <span data-lang="register">Register</span>
        </button>
        <p style="text-align:center; margin-top:12px; font-size:13px; opacity:0.8;">
          <span data-lang="activation-note">After registration, verify your email and wait for admin approval.</span>
        </p>
      </form>

      <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-left"></i> <span data-lang="back-home">Back to Home</span></a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const toast = document.getElementById('toast');
    function showToast(msg, type='success') {
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 5000);
    }

    // Language & Theme
    let currentLang = localStorage.getItem('zentor_lang') || 'en';
    const langToggle = document.getElementById('langToggle');
    const themeToggle = document.getElementById('themeToggle');
    applyLanguage(currentLang);
    applyTheme();

    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      localStorage.setItem('zentor_lang', currentLang);
      applyLanguage(currentLang);
    });

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('zentor_theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> <span>Light</span>' : '<i class="fas fa-moon"></i> <span>Dark</span>';
    });

    function applyTheme() {
      const saved = localStorage.getItem('zentor_theme') || 'light';
      if (saved === 'dark') {
        document.body.classList.add('dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i> <span>Light</span>';
      }
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelector('#langToggle span').textContent = lang === 'en' ? 'AR' : 'EN';
      const trans = {
        en: {
          'teacher-portal': 'Teacher Portal',
          'login-tab': 'Login', 'register-tab': 'Create Account',
          'login': 'Login', 'register': 'Register',
          'email': 'Email', 'password': 'Password', 'fullname': 'Full Name',
          'phone': 'Phone Number', 'subject': 'Teaching Subject (choose one)',
          'grades': 'Grades You Teach', 'activation-note': 'After registration, verify your email and wait for admin approval.',
          'back-home': 'Back to Home'
        },
        ar: {
          'teacher-portal': 'بوابة المعلم',
          'login-tab': 'تسجيل الدخول', 'register-tab': 'إنشاء حساب',
          'login': 'تسجيل الدخول', 'register': 'تسجيل',
          'email': 'البريد الإلكتروني', 'password': 'كلمة المرور', 'fullname': 'الاسم الكامل',
          'phone': 'رقم الهاتف', 'subject': 'اختر مادة التدريس',
          'grades': 'الصفوف التي تدرسها', 'activation-note': 'بعد التسجيل، تحقق من بريدك الإلكتروني وانتظر موافقة المسؤول.',
          'back-home': 'العودة للرئيسية'
        }
      };
      document.querySelectorAll('[data-lang]').forEach(el => {
        const key = el.getAttribute('data-lang');
        if (trans[lang] && trans[lang][key]) el.textContent = trans[lang][key];
      });
    }

    // Populate subjects & grades (static for now)
    const subjects = ['Mathematics', 'Physics', 'Chemistry', 'Biology', 'English', 'Arabic', 'Computer Science', 'History', 'Geography'];
    const grades = Array.from({length:12},(_,i)=>`Grade ${i+1}`);

    const subjectSelect = document.getElementById('regSubject');
    subjects.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; subjectSelect.appendChild(opt); });
    const gradeDiv = document.getElementById('gradeCheckboxes');
    grades.forEach(g => {
      const lbl = document.createElement('label');
      lbl.innerHTML = `<input type="checkbox" value="${g}"> ${g}`;
      gradeDiv.appendChild(lbl);
    });

    // Tab switching
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    tabLogin.addEventListener('click', ()=>{
      tabLogin.classList.add('active'); tabRegister.classList.remove('active');
      loginForm.style.display='block'; registerForm.style.display='none';
    });
    tabRegister.addEventListener('click', ()=>{
      tabRegister.classList.add('active'); tabLogin.classList.remove('active');
      loginForm.style.display='none'; registerForm.style.display='block';
    });

    // Toggle passwords
    document.getElementById('toggleLoginPassword').addEventListener('click', function(){
      const p = document.getElementById('loginPassword');
      p.type = p.type==='password'?'text':'password';
      this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
    });
    document.getElementById('toggleRegPassword').addEventListener('click', function(){
      const p = document.getElementById('regPassword');
      p.type = p.type==='password'?'text':'password';
      this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display='none';
      const btn = document.getElementById('loginBtn');
      btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Loading...';
      btn.disabled=true;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        // Check teacher exists and approved
        const prefRef = doc(db, `teachers/${cred.user.uid}/settings/preferences`);
        const snap = await getDoc(prefRef);
        if (!snap.exists()) {
          await signOut(auth);
          throw new Error(currentLang==='ar'?'حسابك لم يتم تفعيله بعد أو ليس حساب معلم.':'Your account is not activated or not a teacher account.');
        }
        showToast(currentLang==='ar'?'تم تسجيل الدخول بنجاح':'Login successful', 'success');
        setTimeout(()=>window.location.href='dashboard.html', 1000);
      } catch(err) {
        let msg = err.message;
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password')
          msg = currentLang==='ar'?'بريد إلكتروني أو كلمة مرور غير صحيحة.':'Invalid email or password.';
        else if (err.code === 'auth/invalid-email') msg = currentLang==='ar'?'بريد غير صالح':'Invalid email.';
        errEl.textContent = msg;
        errEl.style.display='block';
        showToast(msg, 'error');
      } finally {
        btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Login';
        btn.disabled=false;
      }
    });

    // Register
    document.getElementById('registerForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const phone = document.getElementById('regPhone').value.trim();
      const subject = document.getElementById('regSubject').value;
      const selectedGrades = [...document.querySelectorAll('#gradeCheckboxes input:checked')].map(cb=>cb.value);
      const errEl = document.getElementById('registerError');
      errEl.style.display='none';
      if (!subject || selectedGrades.length===0) {
        errEl.textContent = currentLang==='ar'?'يرجى اختيار المادة والصفوف.':'Please select subject and grades.';
        errEl.style.display='block';
        return;
      }
      const btn = document.getElementById('registerBtn');
      btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Registering...';
      btn.disabled=true;
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        // Send verification email
        await sendEmailVerification(cred.user);
        // Store teacher data with approved: false
        await setDoc(doc(db, `teachers/${cred.user.uid}/settings/profile`), {
          name, email, phone, subject, grades: selectedGrades,
          approved: false, createdAt: new Date().toISOString()
        });
        // Sign out immediately
        await signOut(auth);
        showToast(currentLang==='ar'?'تم التسجيل. تحقق من بريدك وانتظر التفعيل.':'Registered! Verify your email and wait for activation.', 'success');
        // Switch to login tab after 2s
        setTimeout(()=>{
          tabLogin.click();
          document.getElementById('regName').value='';
          document.getElementById('regEmail').value='';
          document.getElementById('regPassword').value='';
          document.getElementById('regPhone').value='';
          subjectSelect.value='';
          document.querySelectorAll('#gradeCheckboxes input').forEach(cb=>cb.checked=false);
        }, 2000);
      } catch(err) {
        let msg = err.message;
        if (err.code === 'auth/email-already-in-use') msg = currentLang==='ar'?'البريد مستخدم مسبقاً.':'Email already in use.';
        errEl.textContent = msg;
        errEl.style.display='block';
        showToast(msg, 'error');
      } finally {
        btn.innerHTML='<i class="fas fa-user-plus"></i> Register';
        btn.disabled=false;
      }
    });

    // Redirect if already logged in and approved
    onAuthStateChanged(auth, async (user)=>{
      if (user) {
        const prefRef = doc(db, `teachers/${user.uid}/settings/preferences`);
        const snap = await getDoc(prefRef);
        if (snap.exists()) {
          window.location.href = 'dashboard.html';
        } else {
          await signOut(auth); // ensure signed out if not approved
        }
      }
    });
  </script>
</body>
</html>
