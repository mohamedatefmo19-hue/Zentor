<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentor Teacher - Student Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2a7de1; --primary-hover: #1a67c4;
      --bg: #f4f7fc; --bg-dark: #0b0e14;
      --card: #ffffff; --card-dark: #1a1f2b;
      --text: #0b1e33; --text-dark: #eef2f6;
      --sidebar-bg: rgba(255,255,255,0.85); --sidebar-bg-dark: rgba(26,31,43,0.9);
      --glass-bg: rgba(255,255,255,0.7); --glass-bg-dark: rgba(26,31,43,0.7);
      --shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }

    .sidebar {
      width: 260px; height: 100vh; position: fixed; top: 0; left: 0;
      background: var(--sidebar-bg); backdrop-filter: blur(24px);
      border-right: 1px solid rgba(255,255,255,0.2);
      padding: 20px; overflow-y: auto; z-index: 1000;
      transition: transform 0.3s, background 0.3s;
    }
    body.dark .sidebar { background: var(--sidebar-bg-dark); border-color: rgba(255,255,255,0.05); }
    .sidebar .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
    .sidebar .logo i { font-size: 28px; color: var(--primary); }
    .sidebar .logo span { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #2a7de1, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 12px;
      color: inherit; text-decoration: none;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 4px; font-weight: 500;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      background: rgba(42,125,225,0.1); color: var(--primary);
    }
    .sidebar nav a i { width: 20px; text-align: center; }

    .main {
      flex: 1; margin-left: 260px; padding: 20px 30px;
      transition: margin-left 0.3s; width: calc(100% - 260px);
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
    }
    .topbar h1 { font-size: 28px; font-weight: 700; }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
      padding: 8px 16px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; gap: 6px; color: inherit;
    }
    body.dark .icon-btn { background: var(--glass-bg-dark); border-color: rgba(255,255,255,0.05); }
    .hamburger { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: inherit; }

    .card {
      background: var(--card); backdrop-filter: blur(20px);
      border-radius: 20px; padding: 24px; box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px;
      transition: background 0.3s;
    }
    body.dark .card { background: var(--card-dark); border-color: rgba(255,255,255,0.05); }
    .card h2 { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    .profile-header { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--primary); color: white; display: flex;
      align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700;
    }
    .detail-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-item { padding: 10px; background: rgba(0,0,0,0.02); border-radius: 10px; }
    body.dark .detail-item { background: rgba(255,255,255,0.03); }
    .detail-item span { font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    body.dark th, body.dark td { border-color: rgba(255,255,255,0.05); }
    th { opacity: 0.7; font-weight: 600; }

    .toast { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #0b1e33; padding: 16px 24px; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 12px; backdrop-filter: blur(20px); z-index: 3000; transform: translateY(120px); opacity: 0; transition: 0.3s; max-width: 350px; border-left: 4px solid var(--primary); }
    body.dark .toast { background: #1a1f2b; color: #eef2f6; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: #e74c3c; }
    .toast.success { border-left-color: #2ecc71; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; width: 100%; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="logo"><i class="fas fa-chalkboard-teacher"></i><span>Zentor</span></div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-th-large"></i> <span data-lang="dashboard">Dashboard</span></a>
      <a href="courses.html"><i class="fas fa-graduation-cap"></i> <span data-lang="courses">Courses</span></a>
      <a href="lessons.html"><i class="fas fa-play-circle"></i> <span data-lang="lessons">Lessons</span></a>
      <a href="live-classes.html"><i class="fas fa-video"></i> <span data-lang="live-classes">Live Classes</span></a>
      <a href="students.html"><i class="fas fa-users"></i> <span data-lang="students">Students</span></a>
      <a href="student-profile.html" class="active"><i class="fas fa-user"></i> <span data-lang="student-profile">Student Profile</span></a>
      <a href="assignments.html"><i class="fas fa-tasks"></i> <span data-lang="assignments">Assignments</span></a>
      <a href="exams.html"><i class="fas fa-file-alt"></i> <span data-lang="exams">Exams</span></a>
      <a href="messages.html"><i class="fas fa-comments"></i> <span data-lang="messages">Messages</span></a>
      <a href="settings.html"><i class="fas fa-cog"></i> <span data-lang="settings">Settings</span></a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <h1 data-lang="student-profile">Student Profile</h1>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="langToggle"><i class="fas fa-globe"></i> <span>AR</span></button>
        <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i> <span>Dark</span></button>
      </div>
    </div>

    <div id="profileContent"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOd-cHm8J84BMwdlP8a3zOVlK8sboUFj0",
      authDomain: "zentor-caaf1.firebaseapp.com",
      projectId: "zentor-caaf1",
      storageBucket: "zentor-caaf1.firebasestorage.app",
      messagingSenderId: "681267238383",
      appId: "1:681267238383:web:0c93fb405bfd6b5903921a",
      measurementId: "G-X80GNJHMS5"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId');
    let currentTeacherId = null;
    let currentLang = localStorage.getItem('zentor_lang') || 'en';

    const toast = document.getElementById('toast');
    function showToast(msg, type='success') {
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelector('#langToggle span').textContent = lang === 'en' ? 'AR' : 'EN';
      const trans = {
        en: {
          dashboard: 'Dashboard', courses: 'Courses', lessons: 'Lessons', 'live-classes': 'Live Classes',
          students: 'Students', 'student-profile': 'Student Profile', assignments: 'Assignments',
          exams: 'Exams', messages: 'Messages', settings: 'Settings',
          'personal-info': 'Personal Information', 'enrolled-courses': 'Enrolled Courses',
          'results': 'Results', 'attendance': 'Attendance',
          'no-courses': 'Not enrolled in any course.', 'no-results': 'No results yet.',
          'no-attendance': 'No attendance records.', 'select-student': 'Please select a student.'
        },
        ar: {
          dashboard: 'لوحة التحكم', courses: 'الكورسات', lessons: 'الدروس', 'live-classes': 'الحصص المباشرة',
          students: 'الطلاب', 'student-profile': 'ملف الطالب', assignments: 'الواجبات',
          exams: 'الامتحانات', messages: 'الرسائل', settings: 'الإعدادات',
          'personal-info': 'المعلومات الشخصية', 'enrolled-courses': 'الكورسات المسجل فيها',
          'results': 'النتائج', 'attendance': 'الحضور',
          'no-courses': 'غير مسجل في أي كورس.', 'no-results': 'لا توجد نتائج بعد.',
          'no-attendance': 'لا توجد سجلات حضور.', 'select-student': 'يرجى اختيار طالب.'
        }
      };
      document.querySelectorAll('[data-lang]').forEach(el => {
        const key = el.getAttribute('data-lang');
        if (trans[lang] && trans[lang][key]) el.textContent = trans[lang][key];
      });
    }
    function applyTheme() {
      const saved = localStorage.getItem('zentor_theme') || 'light';
      const dark = saved === 'dark';
      document.body.classList.toggle('dark', dark);
      document.getElementById('themeToggle').innerHTML = dark ? '<i class="fas fa-sun"></i> <span>Light</span>' : '<i class="fas fa-moon"></i> <span>Dark</span>';
    }

    document.getElementById('langToggle').addEventListener('click', ()=>{
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      localStorage.setItem('zentor_lang', currentLang);
      applyLanguage(currentLang);
      if (currentTeacherId && studentId) loadStudentProfile();
    });
    document.getElementById('themeToggle').addEventListener('click', ()=>{
      document.body.classList.toggle('dark');
      localStorage.setItem('zentor_theme', document.body.classList.contains('dark')?'dark':'light');
      applyTheme();
    });
    document.getElementById('hamburgerBtn').addEventListener('click', ()=> document.getElementById('sidebar').classList.toggle('open'));

    async function loadStudentProfile() {
      if (!currentTeacherId || !studentId) return;
      const container = document.getElementById('profileContent');
      container.innerHTML = '<div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin"></i></div>';

      try {
        const studentRef = doc(db, `teachers/${currentTeacherId}/students`, studentId);
        const studentSnap = await getDoc(studentRef);
        if (!studentSnap.exists()) {
          container.innerHTML = `<div class="empty-state" data-lang="select-student">${currentLang==='ar'?'الطالب غير موجود.':'Student not found.'}</div>`;
          applyLanguage(currentLang);
          return;
        }
        const student = studentSnap.data();
        const initials = (student.name || '??').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);

        // Fetch enrolled courses (subcollection courses inside student)
        const coursesSnap = await getDocs(collection(db, `teachers/${currentTeacherId}/students/${studentId}/courses`));
        const courses = [];
        coursesSnap.forEach(d => courses.push({ id: d.id, ...d.data() }));

        // Fetch results
        const resultsSnap = await getDocs(collection(db, `teachers/${currentTeacherId}/students/${studentId}/results`));
        const results = [];
        resultsSnap.forEach(d => results.push({ id: d.id, ...d.data() }));

        // Fetch attendance
        const attendanceSnap = await getDocs(collection(db, `teachers/${currentTeacherId}/students/${studentId}/attendance`));
        const attendance = [];
        attendanceSnap.forEach(d => attendance.push({ id: d.id, ...d.data() }));

        // Build HTML
        let html = `
          <div class="card">
            <div class="profile-header">
              <div class="avatar">${initials}</div>
              <div>
                <h2>${student.name || ''}</h2>
                <p>${student.email || ''}</p>
              </div>
            </div>
            <div class="detail-row" style="margin-top:20px;">
              <div class="detail-item"><span>Status:</span> ${student.blocked ? '🔴 Blocked' : '🟢 Active'}</div>
              <div class="detail-item"><span>Registered:</span> ${student.createdAt ? new Date(student.createdAt).toLocaleDateString() : '---'}</div>
            </div>
          </div>

          <div class="card">
            <h2><i class="fas fa-graduation-cap"></i> <span data-lang="enrolled-courses">Enrolled Courses</span></h2>
            ${courses.length === 0 ? `<div class="empty-state" data-lang="no-courses">${currentLang==='ar'?'غير مسجل في أي كورس.':'Not enrolled in any course.'}</div>` : 
              `<table><thead><tr><th>Course</th><th>Progress</th></tr></thead><tbody>
                ${courses.map(c => `<tr><td>${c.title || c.courseId}</td><td>${c.progress || 0}%</td></tr>`).join('')}
              </tbody></table>`
            }
          </div>

          <div class="card">
            <h2><i class="fas fa-chart-bar"></i> <span data-lang="results">Results</span></h2>
            ${results.length === 0 ? `<div class="empty-state" data-lang="no-results">${currentLang==='ar'?'لا توجد نتائج بعد.':'No results yet.'}</div>` :
              `<table><thead><tr><th>Exam</th><th>Score</th></tr></thead><tbody>
                ${results.map(r => `<tr><td>${r.examTitle || r.examId}</td><td>${r.score || 0}</td></tr>`).join('')}
              </tbody></table>`
            }
          </div>

          <div class="card">
            <h2><i class="fas fa-calendar-check"></i> <span data-lang="attendance">Attendance</span></h2>
            ${attendance.length === 0 ? `<div class="empty-state" data-lang="no-attendance">${currentLang==='ar'?'لا توجد سجلات حضور.':'No attendance records.'}</div>` :
              `<table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>
                ${attendance.map(a => `<tr><td>${a.date ? new Date(a.date).toLocaleDateString() : '---'}</td><td>${a.present ? 'Present' : 'Absent'}</td></tr>`).join('')}
              </tbody></table>`
            }
          </div>
        `;
        container.innerHTML = html;
        applyLanguage(currentLang);
      } catch (err) {
        container.innerHTML = `<div style="color:red;">Error: ${err.message}</div>`;
      }
    }

    onAuthStateChanged(auth, async (user)=>{
      if (!user) { window.location.href='login.html'; return; }
      const prefSnap = await getDoc(doc(db, `teachers/${user.uid}/settings/preferences`));
      if (!prefSnap.exists()) { await signOut(auth); window.location.href='login.html'; return; }
      currentTeacherId = user.uid;
      applyLanguage(currentLang);
      applyTheme();
      if (studentId) {
        loadStudentProfile();
      } else {
        document.getElementById('profileContent').innerHTML = `<div class="empty-state" data-lang="select-student">${currentLang==='ar'?'يرجى اختيار طالب.':'Please select a student.'}</div>`;
        applyLanguage(currentLang);
      }
    });
  </script>
</body>
</html>
